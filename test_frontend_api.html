<!DOCTYPE html>
<html>
<head>
    <title>API 测试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; max-height: 400px; }
        .error { color: red; background: #fff0f0; }
        .success { color: green; background: #f0fff0; }
    </style>
</head>
<body>
    <h1>前端 API 测试</h1>

    <div>
        <h3>认证状态</h3>
        <p>Token: <span id="token-status">检查中...</span></p>
        <button onclick="testLogin()">测试登录</button>
        <button onclick="clearToken()">清除 Token</button>
    </div>

    <div>
        <h3>API 测试</h3>
        <button onclick="testGetList()">测试获取列表</button>
        <button onclick="testGetListRaw()">测试原始请求</button>
    </div>

    <div>
        <h3>结果</h3>
        <pre id="result">等待测试...</pre>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        function updateTokenStatus() {
            const token = localStorage.getItem('token');
            document.getElementById('token-status').textContent = token ? '已设置 (' + token.substring(0, 20) + '...)' : '未设置';
        }

        function showResult(data, isError = false) {
            const el = document.getElementById('result');
            el.textContent = JSON.stringify(data, null, 2);
            el.className = isError ? 'error' : 'success';
        }

        async function testLogin() {
            try {
                const response = await fetch(`${API_BASE}/api/users/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });

                const data = await response.json();

                if (data.access) {
                    localStorage.setItem('token', data.access);
                    updateTokenStatus();
                    showResult({ message: '登录成功', user: data.user });
                } else {
                    showResult({ error: '登录失败', data }, true);
                }
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        function clearToken() {
            localStorage.removeItem('token');
            updateTokenStatus();
            showResult({ message: 'Token 已清除' });
        }

        async function testGetList() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showResult({ error: '请先登录' }, true);
                    return;
                }

                const response = await fetch(`${API_BASE}/api/testcases/?page=1&limit=5`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                showResult({
                    status: response.status,
                    count: data.count,
                    results_length: data.results?.length,
                    first_item: data.results?.[0]
                });
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        async function testGetListRaw() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showResult({ error: '请先登录' }, true);
                    return;
                }

                const response = await fetch(`${API_BASE}/api/testcases/?page=1&limit=2`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const text = await response.text();

                showResult({
                    status: response.status,
                    headers: Object.fromEntries(response.headers.entries()),
                    body_preview: text.substring(0, 500)
                });
            } catch (error) {
                showResult({ error: error.message }, true);
            }
        }

        // 初始化
        updateTokenStatus();
    </script>
</body>
</html>
