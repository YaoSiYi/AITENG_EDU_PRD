# Nginx 生产环境配置
# 艾腾教育项目 - www.aitengjiaoyu.top
# 后端端口: 8011
# 前端Web端口: 3011
# Uni-app H5端口: 3022

user nginx;
worker_processes auto;
error_log /var/log/nginx/aiteng_error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/aiteng_access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # HTTP 服务器 - 重定向到 HTTPS
    server {
        listen 80;
        server_name www.aitengjiaoyu.top aitengjiaoyu.top;

        # Let's Encrypt 验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 重定向到 HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS 主站 - Web管理后台
    server {
        listen 443 ssl http2;
        server_name www.aitengjiaoyu.top aitengjiaoyu.top;

        # SSL 证书配置
        ssl_certificate /etc/nginx/ssl/aitengjiaoyu.top.crt;
        ssl_certificate_key /etc/nginx/ssl/aitengjiaoyu.top.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 安全头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 前端Web管理后台 (端口3011)
        location / {
            proxy_pass http://127.0.0.1:3011;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # API接口 (后端端口8011)
        location /api/ {
            proxy_pass http://127.0.0.1:8011;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://127.0.0.1:8011;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 静态文件
        location /static/ {
            alias /var/www/aiteng/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 媒体文件
        location /media/ {
            alias /var/www/aiteng/media/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # HTTPS - Uni-app H5 (子域名: h5.aitengjiaoyu.top)
    server {
        listen 80;
        server_name h5.aitengjiaoyu.top;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name h5.aitengjiaoyu.top;

        ssl_certificate /etc/nginx/ssl/aitengjiaoyu.top.crt;
        ssl_certificate_key /etc/nginx/ssl/aitengjiaoyu.top.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Uni-app H5应用 (端口3022)
        location / {
            proxy_pass http://127.0.0.1:3022;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
