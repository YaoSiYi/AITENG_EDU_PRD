# 艾腾教育 - 生产环境 Docker Compose 配置
# 使用方法: docker compose -f docker-compose.production.yml up -d
# 
# 端口映射（避免与服务器现有服务冲突）：
#   MySQL:  3307 -> 3306
#   Redis:  6380 -> 6379
#   Nginx:  8080 -> 80
#   后端:   8011 -> 8000
#   Web:    3011 -> 80
#   H5:     3022 -> 80

services:
  # MySQL 数据库
  db:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME:-education_prod}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backup:/backup
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aiteng-network

  # Redis 缓存
  redis:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - aiteng-network

  # Django 后端 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    ports:
      - "8011:8000"
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - aiteng-network

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A config worker -l info
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - backend
      - redis
    networks:
      - aiteng-network

  # Celery Beat 定时任务
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - backend
      - redis
    networks:
      - aiteng-network

  # 前端 Web 管理后台
  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3011:80"
    depends_on:
      - backend
    networks:
      - aiteng-network

  # Uni-app H5 移动端
  frontend-h5:
    build:
      context: ./frontend-uniapp
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3022:80"
    depends_on:
      - backend
    networks:
      - aiteng-network

  # Nginx 反向代理
  nginx:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.http-only.conf:/etc/nginx/nginx.conf:ro
      - static_data:/var/www/aiteng/static:ro
      - media_data:/var/www/aiteng/media:ro
    depends_on:
      - backend
      - frontend-web
      - frontend-h5
    networks:
      - aiteng-network

volumes:
  mysql_data:
  redis_data:
  static_data:
  media_data:

networks:
  aiteng-network:
    driver: bridge
